<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Sistem Kehadiran APC</title>
  
  <link rel="icon" type="image/png" href="favico.png">
  <meta name="theme-color" content="#8B0000">

  <style>
    body, html {
      margin: 0; padding: 0;
      height: 100%; width: 100%;
      overflow: hidden;
      background: #8B0000;
      font-family: sans-serif;
    }

    iframe {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      border: none;
      z-index: 1;
    }

    .repair-btn {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 99;
      background: rgba(255, 255, 255, 0.95);
      color: #8B0000;
      padding: 12px 24px;
      border-radius: 30px;
      text-decoration: none;
      font-weight: bold;
      font-size: 14px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.5);
      border: 2px solid #8B0000;
      display: none;
      transition: opacity 0.5s ease; /* Tambah ini supaya fade out smooth */
    }
  </style>
</head>
<body>

    <a id="repairLink" href="#" target="_blank" class="repair-btn">
      ⚠️ Masalah Paparan? Klik Sini
    </a>

    <script>
    const urlParams = new URLSearchParams(window.location.search);
    const page = urlParams.get('page');
    
    // 1. USE THE CLEANEST URL FOR THE IFRAME
    // No /u/0/, no /a/kpkt.
    let baseAppUrl = "https://script.google.com/macros/s/AKfycbwHvP2KBvvIRqofHIVZuiGuk1hkJu2Hi5U-6Hrx-R8F7HPRsB7IepjUiqkGbxHcZsl2/exec";
    
    let finalUrl = baseAppUrl;
    if(page) {
        finalUrl += "?page=" + page;
    }
    
    // 2. THE "FORCE SELECT" BUTTON
    // Instead of AccountChooser, we use "prompt=select". 
    // This forces Google to treat the chosen account as the "Active" one for this session.
    const repairUrl = finalUrl + (finalUrl.includes('?') ? '&' : '?') + "prompt=select"; 
    
    const repairBtn = document.getElementById('repairLink');
    repairBtn.href = repairUrl;
    
    // Show button for 10 seconds, then hide
    setTimeout(() => {
      repairBtn.style.display = 'block';
      setTimeout(() => {
          repairBtn.style.opacity = '0';
          setTimeout(() => { repairBtn.style.display = 'none'; }, 500);
      }, 10000);
    }, 3000);

    document.write('<iframe src="' + finalUrl + '"></iframe>');
</script>
</body>
</html>
