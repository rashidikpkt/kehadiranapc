<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <style>
        body, html { margin: 0; padding: 0; height: 100%; width: 100%; overflow: hidden; }
        iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: none; }
    </style>
</head>
<body>
    <script>
        // Kod ini untuk ambil parameter ?page=admin dari URL GitHub
        const urlParams = new URLSearchParams(window.location.search);
        const page = urlParams.get('page');
        let appUrl = "https://script.google.com/macros/s/AKfycbwHvP2KBvvIRqofHIVZuiGuk1hkJu2Hi5U-6Hrx-R8F7HPRsB7IepjUiqkGbxHcZsl2/exec";
        
        if(page) {
            appUrl += "?page=" + page;
        }
        
        document.write('<iframe src="' + appUrl + '"></iframe>');
    </script>
</body>
</html>
